name: Security CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Audit dependencies
        run: npm audit --audit-level=low

      - name: Secret pattern sweep
        run: |
          ! grep -RInE "(sk-[A-Za-z0-9_-]{20,}|sbp_[A-Za-z0-9]{20,}|A[K]IA[0-9A-Z]{16}|BEGIN (RSA|OPENSSH|PRIVATE) KE[Y]|SUPABASE_ACCESS_TOKE[N]|OPENAI_API_KEY=s[k]-|ANTHROPIC_API_KEY=s[k]-)" . \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude=package-lock.json

      - name: Unit and safety tests
        run: npm test

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
